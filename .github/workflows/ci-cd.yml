name: CI/CD Pipeline

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: azurepoc
  DOCKER_BUILDKIT: 1 

permissions:
  id-token: write       # ✅ required for OIDC
  contents: read
  security-events: write

jobs:

  deploy:
    name: 🟢 Deploy
    runs-on: ubuntu-latest

    # environment:
    #   name: dev

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔧 Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5"
          terraform_wrapper: false

      # ✅ OIDC Login — no password
      # - name: 🔐 Azure Login
      #   uses: azure/login@v2
      #   with:
      #     client-id: ${{ secrets.AZURE_CLIENT_ID }}
      #     tenant-id: ${{ secrets.AZURE_TENANT_ID }}
      #     subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: 🔐 Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          audience: api://AzureADTokenExchange    

      # ── Terraform ──────────────────────────────────────────────────────
      - name: 📦 Terraform Init
        working-directory: terraform/environments/dev
        run: |
          terraform init \
            -backend-config="storage_account_name=${{ secrets.TF_STORAGE_ACCOUNT }}"

      - name: 📋 Terraform Plan
        working-directory: terraform/environments/dev
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: "true"        # ✅ tells Terraform to use OIDC
        run: terraform plan -out=tfplan

      - name: 🏗️ Terraform Apply
        working-directory: terraform/environments/dev
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: "true"
        run: terraform apply -auto-approve tfplan

      # ── Build & Scan ───────────────────────────────────────────────────
      - name: 🐳 Build Docker Image
        run: |
          docker build \
            -t ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -t ${{ env.IMAGE_NAME }}:latest \
            -f app/Dockerfile ./app

      - name: 🔍 Trivy — Scan Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ env.IMAGE_NAME }}:${{ github.sha }}"
          format: "table"
          exit-code: "1"
          severity: "CRITICAL,HIGH"
          ignore-unfixed: true

      # ── Push to ACR via OIDC ───────────────────────────────────────────
      - name: 🔐 Login to ACR
        run: |
          az acr login --name ${{ secrets.ACR_NAME }}   # ✅ no username/password needed

      - name: 📦 Push to ACR
        run: |
          docker tag ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker tag ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest

      # ── Deploy ─────────────────────────────────────────────────────────
      - name: ⚙️ Configure Container App Registry
        run: |
          az containerapp registry set \
            --name ${{ secrets.CONTAINER_APP_NAME }} \
            --resource-group ${{ secrets.RESOURCE_GROUP }} \
            --server ${{ secrets.ACR_LOGIN_SERVER }} \
            --identity system

      - name: 🚀 Deploy to Container App
        run: |
          az containerapp update \
            --name ${{ secrets.CONTAINER_APP_NAME }} \
            --resource-group ${{ secrets.RESOURCE_GROUP }} \
            --image ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --revision-suffix ${{ github.run_number }} \
            --set-env-vars "REVISION=${{ github.sha }}"

      - name: ✅ Summary
        run: |
          echo "### ✅ Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
