#####################################

name: CI/CD Pipeline

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: azurepoc
  DOCKER_BUILDKIT: 1

permissions:
  id-token: write
  contents: read
  security-events: write

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_USE_OIDC: "true"
      ARM_USE_CLI: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          audience: api://AzureADTokenExchange

      - name: Get Deployer Object ID
        run: |
          OBJECT_ID=$(az ad sp show --id ${{ secrets.AZURE_CLIENT_ID }} --query id -o tsv)
          echo "TF_VAR_deployer_object_id=$OBJECT_ID" >> $GITHUB_ENV

      # ── Terraform Init ─────────────────────────────────────────────────
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5"
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: terraform/environments/dev
        run: |
          terraform init \
            -backend-config="storage_account_name=${{ secrets.TF_STORAGE_ACCOUNT }}"

      # ── Build ──────────────────────────────────────────────────────────
      - name: Build Docker Image
        run: |
          docker build \
            -t ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -t ${{ env.IMAGE_NAME }}:latest \
            -f app/Dockerfile ./app

      # ── Scan ───────────────────────────────────────────────────────────
      - name: Trivy — Scan Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ env.IMAGE_NAME }}:${{ github.sha }}"
          format: "table"
          exit-code: "0"
          severity: "CRITICAL,HIGH"
          ignore-unfixed: true

      - name: Trivy — SARIF Report
        uses: aquasecurity/trivy-action@master
        if: always()
        with:
          image-ref: "${{ env.IMAGE_NAME }}:${{ github.sha }}"
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH,MEDIUM"

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-results.sarif"

      # ── Push to ACR ────────────────────────────────────────────────────
      - name: Login to ACR
        run: az acr login --name ${{ secrets.ACR_NAME }}

      - name: Push to ACR
        run: |
          docker tag ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker tag ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest

      # ── Deploy: single apply after image exists in ACR ─────────────────
      - name: Terraform Plan
        working-directory: terraform/environments/dev
        run: |
          terraform plan \
            -var="image_tag=${{ github.sha }}" \
            -var="revision_number=${{ github.run_number }}" \
            -out=tfplan

      - name: Terraform Apply
        working-directory: terraform/environments/dev
        run: terraform apply -auto-approve tfplan

      # ── Verify Revision Health ─────────────────────────────────────────
      - name: Verify Revision is Healthy
        run: |
          REVISION="poc-app-${{ secrets.ENVIRONMENT }}--v${{ github.run_number }}-${GITHUB_SHA::7}"
          echo "Waiting for revision $REVISION to become healthy..."

          for i in {1..18}; do
            STATUS=$(az containerapp revision show \
              --name ${{ secrets.CONTAINER_APP_NAME }} \
              --resource-group ${{ secrets.RESOURCE_GROUP }} \
              --revision "$REVISION" \
              --query "properties.runningState" -o tsv 2>/dev/null || echo "Unknown")

            echo "Attempt $i/18 — Status: $STATUS"

            if [ "$STATUS" = "Running" ]; then
              echo "✅ Revision $REVISION is healthy"
              exit 0
            fi

            if [ "$STATUS" = "Failed" ]; then
              echo "❌ Revision $REVISION failed — Azure kept traffic on previous revision"
              exit 1
            fi

            sleep 10
          done

          echo "❌ Revision did not become healthy within 3 minutes"
          exit 1

      # ── Cleanup Old Revisions (keep last 2) ───────────────────────────
      - name: Deactivate Old Revisions
        if: success()
        run: |
          OLD_REVISIONS=$(az containerapp revision list \
            --name ${{ secrets.CONTAINER_APP_NAME }} \
            --resource-group ${{ secrets.RESOURCE_GROUP }} \
            --query "sort_by([].{name:name, time:properties.createdTime}, &time) | [0:-2].name" \
            -o tsv)

          if [ -z "$OLD_REVISIONS" ]; then
            echo "No old revisions to deactivate."
          else
            for revision in $OLD_REVISIONS; do
              echo "Deactivating: $revision"
              az containerapp revision deactivate \
                --name ${{ secrets.CONTAINER_APP_NAME }} \
                --resource-group ${{ secrets.RESOURCE_GROUP }} \
                --revision $revision
            done
          fi

      # ── Summary ────────────────────────────────────────────────────────
      - name: Summary
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "### ✅ Deployment Complete" >> $GITHUB_STEP_SUMMARY
          else
            echo "### ❌ Deployment Failed — Previous revision still serving traffic" >> $GITHUB_STEP_SUMMARY
          fi
          echo "- **Run:** \`#${{ github.run_number }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Image:** \`${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Revision:** \`v${{ github.run_number }}-${GITHUB_SHA::7}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "#### Active Revisions" >> $GITHUB_STEP_SUMMARY
          az containerapp revision list \
            --name ${{ secrets.CONTAINER_APP_NAME }} \
            --resource-group ${{ secrets.RESOURCE_GROUP }} \
            --query "[?properties.active==true].{Revision:name, Traffic:properties.trafficWeight, Created:properties.createdTime}" \
            -o table >> $GITHUB_STEP_SUMMARY
# ```

# ---

# ## Flow
# ```
# Checkout
#     ↓
# Azure Login
#     ↓
# Terraform Init
#     ↓
# Build Image
#     ↓
# Scan (Trivy)
#     ↓
# Push to ACR          ← image exists here
#     ↓
# Terraform Apply      ← single apply with sha + run_number
#     ↓
# Deactivate old revisions
#     ↓
# Summary
# ```


# ```

# ---

# ## How auto-rollback works
# ```
# New revision deployed (--40)
#         ↓
# Readiness probe fails repeatedly
#         ↓
# Azure never shifts traffic to --40
#         ↓
# --39 continues serving 100% traffic  ← automatic, no action needed
#         ↓
# --40 stays in "failed" state