name: Trigger auto deployment for poc-app-dev

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/poc-app-dev-AutoDeployTrigger-ee4eee91-1b99-4d60-82fd-15d10b7bffb9.yml'

  # Allow manual trigger 
  workflow_dispatch:
      
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.POCAPPDEV_AZURE_CREDENTIALS }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: acrazurepocdev8zm8ln.azurecr.io
          registryUsername: ${{ secrets.POCAPPDEV_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.POCAPPDEV_REGISTRY_PASSWORD }}
          containerAppName: poc-app-dev
          resourceGroup: rg-app-devops_Jegan
          imageToBuild: acrazurepocdev8zm8ln.azurecr.io/poc-app-dev:${{ github.sha }}
          
            

     

